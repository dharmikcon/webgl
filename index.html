<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | Convai</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
    </div>
    <script>
      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var warningBanner = document.querySelector("#unity-warning");
      var micPermissionGranted = false;
      var micPermissionRequested = false;
      var unityInstanceRef = null;

      // Shows a temporary message banner/ribbon for a few seconds, or
      // a permanent error message on top of the canvas if type=='error'.
      // If type=='warning', a yellow highlight color is used.
      // Modify or remove this function to customize the visually presented
      // way that non-critical warnings and error messages are presented to the
      // user.
      function unityShowBanner(msg, type) {
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      function setMicPermissionStatus(msg, isError) {
        if (!msg) return;
        unityShowBanner(msg, isError ? "warning" : "warning");
      }

      function tryEnableUnityWebGLAudioFlow() {
        if (!unityInstanceRef || typeof unityInstanceRef.SendMessage !== "function") {
          return;
        }

        var targetObjects = [
          "ConvaiManager",
          "Convai Manager",
          "ConvaiRoomManager",
          "Convai Room Manager"
        ];

        for (var i = 0; i < targetObjects.length; i++) {
          try {
            unityInstanceRef.SendMessage(targetObjects[i], "EnableAudioAndStartListening");
          } catch (e1) {
            try {
              unityInstanceRef.SendMessage(targetObjects[i], "EnableAudioPlayback");
            } catch (e2) {
              // Keep trying remaining object names.
            }
          }
        }
      }

      async function requestMicrophonePermission() {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          setMicPermissionStatus("Microphone API is not available in this browser.", true);
          unityShowBanner("Microphone API is not available in this browser.", "warning");
          return false;
        }

        if (!window.isSecureContext) {
          setMicPermissionStatus("Microphone requires HTTPS or localhost.", true);
          unityShowBanner("Microphone requires HTTPS or localhost.", "warning");
          return false;
        }

        try {
          setMicPermissionStatus("Requesting microphone permission...", false);
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          stream.getTracks().forEach((t) => t.stop());
          micPermissionGranted = true;
          setMicPermissionStatus("Microphone permission granted.", false);
          tryEnableUnityWebGLAudioFlow();

          return true;
        } catch (err) {
          const message = (err && err.message) ? err.message : "Microphone permission denied.";
          setMicPermissionStatus(message, true);
          unityShowBanner("Microphone permission denied.", "warning");
          return false;
        }
      }

      function armMicrophonePermissionOnFirstGesture() {
        if (micPermissionRequested || micPermissionGranted) return;

        var requestOnce = async function() {
          if (micPermissionRequested || micPermissionGranted) return;
          micPermissionRequested = true;
          teardown();
          await requestMicrophonePermission();
        };

        var teardown = function() {
          window.removeEventListener("pointerdown", requestOnce, true);
          window.removeEventListener("keydown", requestOnce, true);
          window.removeEventListener("touchstart", requestOnce, true);
        };

        window.addEventListener("pointerdown", requestOnce, true);
        window.addEventListener("keydown", requestOnce, true);
        window.addEventListener("touchstart", requestOnce, true);
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/webgl.loader.js";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/webgl.data",
        frameworkUrl: buildUrl + "/webgl.framework.js",
        codeUrl: buildUrl + "/webgl.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Convai",
        productName: "Convai",
        productVersion: "0.1.0",
        showBanner: unityShowBanner,
        // errorHandler: function(err, url, line) {
        //    alert("error " + err + " occurred at line " + line);
        //    // Return 'true' if you handled this error and don't want Unity
        //    // to process it further, 'false' otherwise.
        //    return true;
        // },
      };

      // By default Unity keeps WebGL canvas render target size matched with
      // the DOM size of the canvas element (scaled by window.devicePixelRatio)
      // Set this to false if you want to decouple this synchronization from
      // happening inside the engine, and you would instead like to size up
      // the canvas DOM size and WebGL render target sizes yourself.
      // config.matchWebGLToCanvasSize = false;

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        // Mobile device style: fill the whole browser client area with the game canvas:
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
      }


      loadingBar.style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = 100 * progress + "%";
        }).then((unityInstance) => {
          unityInstanceRef = unityInstance;
          loadingBar.style.display = "none";
          armMicrophonePermissionOnFirstGesture();
          if (micPermissionGranted) {
            tryEnableUnityWebGLAudioFlow();
          }
        }).catch((message) => {
          alert(message);
        });
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>
